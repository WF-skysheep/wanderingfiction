<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主页</title>
  <style>
    :root {
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --bg: #ffffff;
      --panel: #f8fafc;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .tool-entry {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1001;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.18);
    }

    .tool-entry:hover { background: var(--primary-hover); }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.45);
      display: none;
      z-index: 1000;
    }

    .modal.open { display: block; }

    .panel {
      position: absolute;
      top: 52px;
      right: 16px;
      width: min(960px, calc(100vw - 24px));
      max-height: calc(100vh - 68px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.25);
      padding: 16px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .panel-title {
      margin: 0;
      font-size: 20px;
    }

    .close-btn {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .desc {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @media (min-width: 880px) {
      .grid.two { grid-template-columns: 1fr 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 13px;
      font-weight: 700;
    }

    input[type="text"], select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 140px;
      line-height: 1.45;
      resize: vertical;
    }

    input[type="file"] {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
    }

    .btn.secondary {
      background: #475569;
    }

    .btn:hover { filter: brightness(0.95); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .status {
      margin: 8px 0 0;
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    .detected {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .preview {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    .history {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
    }

    .history h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .history-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 6px;
      max-height: 180px;
      overflow: auto;
    }

    .history-item button {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 9px;
      background: #f8fafc;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="openToolBtn" class="tool-entry">OCR 翻译工具</button>

  <div id="toolModal" class="modal" aria-hidden="true">
    <section class="panel" role="dialog" aria-modal="true" aria-label="OCR 翻译工具">
      <div class="panel-header">
        <h1 class="panel-title">OCR 识别与翻译</h1>
        <button id="closeToolBtn" class="close-btn">关闭</button>
      </div>
      <p class="desc">入口集中在主页右上角。支持：仅 OCR、省 tokens、OCR 高精度、翻译、历史记录、导出 PDF。</p>

      <div class="grid two">
        <div class="field">
          <label for="targetLang">目标语言</label>
          <select id="targetLang">
            <option value="简体中文" selected>中文（简体）</option>
            <option value="繁體中文">中文（繁體）</option>
            <option value="English">英语</option>
            <option value="日本語">日语</option>
            <option value="한국어">韩语</option>
            <option value="Español">西班牙语</option>
            <option value="Français">法语</option>
            <option value="Deutsch">德语</option>
            <option value="Русский">俄语</option>
            <option value="العربية">阿拉伯语</option>
          </select>
        </div>

        <div class="field">
          <label for="model">DeepSeek 模型</label>
          <select id="model">
            <option value="deepseek-chat" selected>chat (deepseek-chat)</option>
            <option value="deepseek-reasoner">reasoner (deepseek-reasoner)</option>
          </select>
        </div>

        <div class="field">
          <label for="ocrLang">OCR 识别语言</label>
          <select id="ocrLang">
            <option value="eng+chi_sim+jpn+kor+spa+fra+deu+rus+ara" selected>自动多语言（中英日韩西法德俄阿）</option>
            <option value="chi_sim">中文（简体）</option>
            <option value="chi_tra">中文（繁体）</option>
            <option value="eng">英语</option>
            <option value="jpn">日语</option>
            <option value="kor">韩语</option>
            <option value="spa">西班牙语</option>
            <option value="fra">法语</option>
            <option value="deu">德语</option>
            <option value="rus">俄语</option>
            <option value="ara">阿拉伯语</option>
            <option value="eng+chi_sim">中英双语</option>
            <option value="eng+jpn">英日双语</option>
          </select>
        </div>

        <div class="field">
          <label for="ocrMode">OCR 模式</label>
          <select id="ocrMode">
            <option value="standard" selected>标准模式（更快）</option>
            <option value="high">高精度模式（更慢）</option>
          </select>
        </div>

        <div class="field">
          <label for="onlyOcrMode">运行方式</label>
          <select id="onlyOcrMode">
            <option value="ocr_translate" selected>识别 + 翻译</option>
            <option value="ocr_only">仅识别（省 tokens）</option>
          </select>
        </div>

        <div class="field">
          <label for="imageInput">上传图片</label>
          <input id="imageInput" type="file" accept="image/*">
          <span class="small">高精度模式会多跑一次增强识别，速度更慢但更稳。</span>
        </div>
      </div>

      <div class="actions">
        <button id="runBtn" class="btn">开始识别并处理</button>
        <button id="copyBtn" class="btn secondary" disabled>复制翻译结果</button>
        <button id="exportPdfBtn" class="btn secondary" disabled>导出 PDF</button>
      </div>

      <p id="status" class="status">等待上传图片...</p>
      <p id="detectedLang" class="detected">检测到语言：-</p>

      <div class="grid two">
        <div class="field">
          <label for="ocrText">识别出的原文</label>
          <textarea id="ocrText" placeholder="OCR 结果会显示在这里"></textarea>
        </div>
        <div class="field">
          <label for="translatedText">翻译结果</label>
          <textarea id="translatedText" placeholder="翻译结果会显示在这里"></textarea>
        </div>
      </div>

      <div class="grid two">
        <div class="field">
          <label>图片预览</label>
          <img id="preview" class="preview" alt="上传图片预览">
        </div>

        <section class="history">
          <h3>最近翻译记录（10条）</h3>
          <ul id="historyList" class="history-list"></ul>
        </section>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
  <script>
    const WORKER_BASE_URL = "https://restless-credit-a6e1.wangderingfiction.workers.dev";

    const openToolBtn = document.getElementById("openToolBtn");
    const closeToolBtn = document.getElementById("closeToolBtn");
    const toolModal = document.getElementById("toolModal");

    const imageInput = document.getElementById("imageInput");
    const runBtn = document.getElementById("runBtn");
    const copyBtn = document.getElementById("copyBtn");
    const exportPdfBtn = document.getElementById("exportPdfBtn");
    const targetLangInput = document.getElementById("targetLang");
    const ocrLangInput = document.getElementById("ocrLang");
    const ocrModeInput = document.getElementById("ocrMode");
    const onlyOcrModeInput = document.getElementById("onlyOcrMode");
    const modelInput = document.getElementById("model");

    const ocrTextArea = document.getElementById("ocrText");
    const translatedTextArea = document.getElementById("translatedText");
    const statusEl = document.getElementById("status");
    const detectedLangEl = document.getElementById("detectedLang");
    const previewEl = document.getElementById("preview");
    const historyListEl = document.getElementById("historyList");

    const HISTORY_KEY = "ocr_translate_history_v1";
    const OCR_GOOD_CONFIDENCE = 75;

    function openTool() {
      toolModal.classList.add("open");
      toolModal.setAttribute("aria-hidden", "false");
    }

    function closeTool() {
      toolModal.classList.remove("open");
      toolModal.setAttribute("aria-hidden", "true");
    }

    openToolBtn.addEventListener("click", openTool);
    closeToolBtn.addEventListener("click", closeTool);
    toolModal.addEventListener("click", (event) => {
      if (event.target === toolModal) closeTool();
    });

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      previewEl.src = url;
      setStatus("图片已选择，可以开始识别。", false);
    });

    async function recognizeWithTesseract(input, languages, stage) {
      const { data } = await Tesseract.recognize(input, languages, {
        logger: (m) => {
          if (m.status && typeof m.progress === "number") {
            const percent = Math.round(m.progress * 100);
            setStatus(`OCR(${stage})：${m.status} (${percent}%)`);
          }
        }
      });
      return {
        text: (data.text || "").trim(),
        confidence: Number.isFinite(data.confidence) ? data.confidence : 0,
      };
    }

    async function preprocessImageForOCR(file, profile = "normal") {
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(2.2, Math.max(1.2, 1600 / Math.max(bitmap.width, bitmap.height)));
      const targetWidth = Math.max(1, Math.round(bitmap.width * scale));
      const targetHeight = Math.max(1, Math.round(bitmap.height * scale));

      const canvas = document.createElement("canvas");
      canvas.width = targetWidth;
      canvas.height = targetHeight;

      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      if (!ctx) throw new Error("无法创建图像预处理上下文。");

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, targetWidth, targetHeight);
      ctx.drawImage(bitmap, 0, 0, targetWidth, targetHeight);

      const imageData = ctx.getImageData(0, 0, targetWidth, targetHeight);
      const pixels = imageData.data;
      const highMode = profile === "high";
      for (let i = 0; i < pixels.length; i += 4) {
        const gray = 0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2];
        const contrast = Math.max(0, Math.min(255, (gray - 128) * (highMode ? 1.55 : 1.35) + 128));
        const whiteThreshold = highMode ? 175 : 185;
        const blackThreshold = highMode ? 78 : 70;
        const normalized = contrast > whiteThreshold ? 255 : contrast < blackThreshold ? 0 : contrast;
        pixels[i] = normalized;
        pixels[i + 1] = normalized;
        pixels[i + 2] = normalized;
      }
      ctx.putImageData(imageData, 0, 0);

      return await new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error("预处理图像生成失败。"));
            return;
          }
          resolve(blob);
        }, "image/png");
      });
    }

    function pickBetterOCRResult(primary, secondary) {
      const score = (candidate) => {
        const textLen = (candidate.text || "").replace(/\s+/g, "").length;
        return candidate.confidence + Math.min(60, textLen / 2);
      };
      return score(secondary) > score(primary) ? secondary : primary;
    }

    async function recognizeText(file, languages, mode) {
      const firstPass = await recognizeWithTesseract(file, languages, "原图");
      const firstLen = firstPass.text.replace(/\s+/g, "").length;
      if (mode !== "high" && firstPass.confidence >= OCR_GOOD_CONFIDENCE && firstLen >= 18) {
        return firstPass.text;
      }

      setStatus("OCR：原图结果一般，正在进行增强识别...", false);
      const enhancedImage = await preprocessImageForOCR(file, "normal");
      const secondPass = await recognizeWithTesseract(enhancedImage, languages, "增强图");
      let best = pickBetterOCRResult(firstPass, secondPass);

      if (mode === "high") {
        setStatus("OCR：高精度模式，正在进行额外增强识别...", false);
        const highImage = await preprocessImageForOCR(file, "high");
        const thirdPass = await recognizeWithTesseract(highImage, languages, "高精度图");
        best = pickBetterOCRResult(best, thirdPass);
      }

      return best.text;
    }

    function loadHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        if (!Array.isArray(parsed)) return [];
        return parsed;
      } catch {
        return [];
      }
    }

    function saveHistoryItem(item) {
      const current = loadHistory();
      const next = [item, ...current].slice(0, 10);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(next));
      renderHistory();
    }

    function renderHistory() {
      const items = loadHistory();
      historyListEl.innerHTML = "";

      if (!items.length) {
        const li = document.createElement("li");
        li.textContent = "暂无历史记录";
        li.className = "small";
        historyListEl.appendChild(li);
        return;
      }

      for (const item of items) {
        const li = document.createElement("li");
        li.className = "history-item";
        const btn = document.createElement("button");
        const brief = item.sourceText.length > 80 ? `${item.sourceText.slice(0, 80)}...` : item.sourceText;
        btn.textContent = `[${item.sourceLanguage} -> ${item.targetLanguage}] ${brief}`;
        btn.addEventListener("click", () => {
          targetLangInput.value = item.targetLanguage;
          ocrTextArea.value = item.sourceText;
          translatedTextArea.value = item.translatedText;
          detectedLangEl.textContent = `检测到语言：${item.sourceLanguage}`;
          copyBtn.disabled = false;
          exportPdfBtn.disabled = false;
          setStatus("已载入历史记录。", false);
          openTool();
        });
        li.appendChild(btn);
        historyListEl.appendChild(li);
      }
    }

    async function translateViaBackend(sourceText, targetLanguage, model) {
      const response = await fetch(`${WORKER_BASE_URL}/api/translate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sourceText, targetLanguage, model })
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || `后端翻译失败：HTTP ${response.status}`);
      }

      if (!data.translatedText || typeof data.translatedText !== "string") {
        throw new Error("后端返回数据异常：缺少 translatedText。");
      }

      return {
        translatedText: data.translatedText,
        sourceLanguage: typeof data.sourceLanguage === "string" && data.sourceLanguage.trim()
          ? data.sourceLanguage.trim()
          : "未知"
      };
    }

    async function run() {
      const file = imageInput.files[0];
      const targetLanguage = targetLangInput.value.trim();
      const ocrLanguages = ocrLangInput.value.trim() || "eng";
      const ocrMode = ocrModeInput.value === "high" ? "high" : "standard";
      const runMode = onlyOcrModeInput.value === "ocr_only" ? "ocr_only" : "ocr_translate";
      const model = modelInput.value.trim() || "deepseek-chat";

      if (!file) {
        setStatus("请先上传一张图片。", true);
        return;
      }
      if (!targetLanguage) {
        setStatus("请填写目标语言。", true);
        return;
      }

      runBtn.disabled = true;
      copyBtn.disabled = true;
      exportPdfBtn.disabled = true;
      translatedTextArea.value = "";
      detectedLangEl.textContent = "检测到语言：-";

      try {
        setStatus("开始 OCR 识别...");
        const ocrText = await recognizeText(file, ocrLanguages, ocrMode);
        ocrTextArea.value = ocrText;

        if (!ocrText) {
          throw new Error("OCR 未识别到可用文字，请换更清晰的图片或调整 OCR 语言。");
        }

        if (runMode === "ocr_only") {
          translatedTextArea.value = "";
          detectedLangEl.textContent = "检测到语言：仅 OCR 模式未启用语言检测";
          copyBtn.disabled = false;
          exportPdfBtn.disabled = true;
          setStatus("完成：仅识别，未调用翻译接口（已节省 tokens）。", false);
        } else {
          setStatus("OCR 完成，正在调用后端翻译...");
          const result = await translateViaBackend(ocrText, targetLanguage, model);
          translatedTextArea.value = result.translatedText;
          detectedLangEl.textContent = `检测到语言：${result.sourceLanguage}`;

          saveHistoryItem({
            sourceLanguage: result.sourceLanguage,
            targetLanguage,
            sourceText: ocrText,
            translatedText: result.translatedText,
            createdAt: Date.now()
          });

          copyBtn.disabled = false;
          exportPdfBtn.disabled = false;
          setStatus("完成：已识别并翻译。", false);
        }
      } catch (err) {
        setStatus(err.message || "发生未知错误", true);
      } finally {
        runBtn.disabled = false;
      }
    }

    runBtn.addEventListener("click", run);

    copyBtn.addEventListener("click", async () => {
      const content = translatedTextArea.value.trim() || ocrTextArea.value.trim();
      if (!content) {
        setStatus("暂无可复制内容。", true);
        return;
      }
      try {
        await navigator.clipboard.writeText(content);
        setStatus("内容已复制到剪贴板。", false);
      } catch {
        setStatus("复制失败，请手动复制文本。", true);
      }
    });

    exportPdfBtn.addEventListener("click", async () => {
      const translated = translatedTextArea.value.trim();
      if (!translated) {
        setStatus("暂无可导出的翻译结果。", true);
        return;
      }

      const sourceLang = detectedLangEl.textContent.replace("检测到语言：", "").trim() || "未知";
      const targetLang = targetLangInput.value.trim() || "未指定";
      const now = new Date();
      const ts = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}_${String(now.getHours()).padStart(2, "0")}-${String(now.getMinutes()).padStart(2, "0")}`;
      const filename = `translation_${ts}.pdf`;

      const container = document.createElement("div");
      container.style.width = "800px";
      container.style.padding = "24px";
      container.style.fontFamily = '"Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif';
      container.style.background = "#ffffff";
      container.style.color = "#111827";
      container.innerHTML = `
        <h1 style="margin:0 0 12px;font-size:24px;">翻译结果导出</h1>
        <p style="margin:0 0 6px;font-size:14px;">导出时间：${now.toLocaleString()}</p>
        <p style="margin:0 0 6px;font-size:14px;">检测语言：${sourceLang}</p>
        <p style="margin:0 0 16px;font-size:14px;">目标语言：${targetLang}</p>
        <h2 style="margin:0 0 8px;font-size:18px;">翻译内容</h2>
        <div style="font-size:14px;line-height:1.6;white-space:pre-wrap;border:1px solid #e5e7eb;border-radius:8px;padding:12px;">${escapeHtml(translated)}</div>
      `;
      document.body.appendChild(container);

      try {
        setStatus("正在生成 PDF...", false);
        await html2pdf().set({
          margin: [10, 10, 10, 10],
          filename,
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
        }).from(container).save();
        setStatus("PDF 导出完成。", false);
      } catch (err) {
        setStatus(err.message || "PDF 导出失败。", true);
      } finally {
        container.remove();
      }
    });

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    renderHistory();
  </script>
</body>
</html>
