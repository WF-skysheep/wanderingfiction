<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片文字识别与翻译（DeepSeek 后端）</title>
  <style>
    :root {
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --border: #e5e7eb;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(140deg, #f1f5f9, #f8fafc 45%, #eef2ff);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 28px;
    }

    p {
      margin-top: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    @media (min-width: 760px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.45;
    }

    input[type="file"] {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
    }

    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .secondary { background: #475569; }
    .secondary:hover { background: #334155; }

    .status {
      margin: 10px 0 0;
      font-size: 14px;
      color: var(--muted);
      min-height: 22px;
    }

    .error {
      color: var(--danger);
      font-weight: 600;
    }

    .preview {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    .out { margin-top: 12px; }

    .detected {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .history {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #f8fafc;
    }

    .history h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .history-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 240px;
      overflow: auto;
    }

    .history-item button {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
    }

    .history-item button:hover {
      background: #f1f5f9;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>图片文字识别 + DeepSeek 翻译</h1>
    <p>前端只负责 OCR；翻译由独立 Cloudflare Worker 后端调用 DeepSeek API，避免在浏览器暴露密钥。</p>

    <div class="grid">
      <div class="field">
        <label for="targetLang">目标语言</label>
        <select id="targetLang">
          <option value="简体中文" selected>中文（简体）</option>
          <option value="繁體中文">中文（繁體）</option>
          <option value="English">英语</option>
          <option value="日本語">日语</option>
          <option value="한국어">韩语</option>
          <option value="Español">西班牙语</option>
          <option value="Français">法语</option>
          <option value="Deutsch">德语</option>
          <option value="Русский">俄语</option>
          <option value="العربية">阿拉伯语</option>
        </select>
      </div>

      <div class="field">
        <label for="model">DeepSeek 模型</label>
        <select id="model">
          <option value="deepseek-chat" selected>chat (deepseek-chat)</option>
          <option value="deepseek-reasoner">reasoner (deepseek-reasoner)</option>
        </select>
      </div>

      <div class="field">
        <label for="ocrLang">OCR 识别语言（切换）</label>
        <select id="ocrLang">
          <option value="eng+chi_sim+jpn+kor+spa+fra+deu+rus+ara" selected>自动多语言（中英日韩西法德俄阿）</option>
          <option value="chi_sim">中文（简体）</option>
          <option value="chi_tra">中文（繁体）</option>
          <option value="eng">英语</option>
          <option value="jpn">日语</option>
          <option value="kor">韩语</option>
          <option value="spa">西班牙语</option>
          <option value="fra">法语</option>
          <option value="deu">德语</option>
          <option value="rus">俄语</option>
          <option value="ara">阿拉伯语</option>
          <option value="eng+chi_sim">中英双语</option>
          <option value="eng+jpn">英日双语</option>
        </select>
        <span class="small">无需部署，直接浏览器识别。可按需切换以提高准确率。</span>
      </div>
    </div>

    <div class="field">
      <label for="imageInput">上传图片</label>
      <input id="imageInput" type="file" accept="image/*">
    </div>

    <div class="actions">
      <button id="runBtn">开始识别并翻译</button>
      <button id="copyBtn" class="secondary" disabled>复制翻译结果</button>
      <button id="exportPdfBtn" class="secondary" disabled>导出 PDF</button>
    </div>

    <p id="status" class="status">等待上传图片...</p>
    <p id="detectedLang" class="detected">检测到语言：-</p>

    <div class="grid out">
      <div class="field">
        <label for="ocrText">识别出的原文</label>
        <textarea id="ocrText" placeholder="OCR 结果会显示在这里"></textarea>
      </div>

      <div class="field">
        <label for="translatedText">翻译结果</label>
        <textarea id="translatedText" placeholder="翻译结果会显示在这里"></textarea>
      </div>
    </div>

    <div class="field">
      <label>图片预览</label>
      <img id="preview" class="preview" alt="上传图片预览">
    </div>

    <section class="history">
      <h2>最近翻译记录（10条）</h2>
      <ul id="historyList" class="history-list"></ul>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
  <script>
    const WORKER_BASE_URL = "https://restless-credit-a6e1.wangderingfiction.workers.dev";
    const imageInput = document.getElementById("imageInput");
    const runBtn = document.getElementById("runBtn");
    const copyBtn = document.getElementById("copyBtn");
    const exportPdfBtn = document.getElementById("exportPdfBtn");
    const targetLangInput = document.getElementById("targetLang");
    const ocrLangInput = document.getElementById("ocrLang");
    const modelInput = document.getElementById("model");
    const ocrTextArea = document.getElementById("ocrText");
    const translatedTextArea = document.getElementById("translatedText");
    const statusEl = document.getElementById("status");
    const detectedLangEl = document.getElementById("detectedLang");
    const previewEl = document.getElementById("preview");
    const historyListEl = document.getElementById("historyList");
    const HISTORY_KEY = "ocr_translate_history_v1";
    const OCR_GOOD_CONFIDENCE = 75;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      previewEl.src = url;
      setStatus("图片已选择，可以开始识别。", false);
    });

    async function recognizeWithTesseract(input, languages, stage) {
      const { data } = await Tesseract.recognize(input, languages, {
        logger: (m) => {
          if (m.status && typeof m.progress === "number") {
            const percent = Math.round(m.progress * 100);
            setStatus(`OCR(${stage})：${m.status} (${percent}%)`);
          }
        }
      });
      return {
        text: (data.text || "").trim(),
        confidence: Number.isFinite(data.confidence) ? data.confidence : 0,
      };
    }

    async function preprocessImageForOCR(file) {
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(2.2, Math.max(1.2, 1600 / Math.max(bitmap.width, bitmap.height)));
      const targetWidth = Math.max(1, Math.round(bitmap.width * scale));
      const targetHeight = Math.max(1, Math.round(bitmap.height * scale));

      const canvas = document.createElement("canvas");
      canvas.width = targetWidth;
      canvas.height = targetHeight;

      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      if (!ctx) throw new Error("无法创建图像预处理上下文。");

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, targetWidth, targetHeight);
      ctx.drawImage(bitmap, 0, 0, targetWidth, targetHeight);

      const imageData = ctx.getImageData(0, 0, targetWidth, targetHeight);
      const pixels = imageData.data;
      for (let i = 0; i < pixels.length; i += 4) {
        const gray = 0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2];
        const contrast = Math.max(0, Math.min(255, (gray - 128) * 1.35 + 128));
        const normalized = contrast > 185 ? 255 : contrast < 70 ? 0 : contrast;
        pixels[i] = normalized;
        pixels[i + 1] = normalized;
        pixels[i + 2] = normalized;
      }
      ctx.putImageData(imageData, 0, 0);

      return await new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error("预处理图像生成失败。"));
            return;
          }
          resolve(blob);
        }, "image/png");
      });
    }

    function pickBetterOCRResult(primary, secondary) {
      const score = (candidate) => {
        const textLen = (candidate.text || "").replace(/\s+/g, "").length;
        return candidate.confidence + Math.min(60, textLen / 2);
      };
      return score(secondary) > score(primary) ? secondary : primary;
    }

    async function recognizeText(file, languages) {
      const firstPass = await recognizeWithTesseract(file, languages, "原图");
      const firstLen = firstPass.text.replace(/\s+/g, "").length;
      if (firstPass.confidence >= OCR_GOOD_CONFIDENCE && firstLen >= 18) {
        return firstPass.text;
      }

      setStatus("OCR：原图结果一般，正在进行增强识别...", false);
      const enhancedImage = await preprocessImageForOCR(file);
      const secondPass = await recognizeWithTesseract(enhancedImage, languages, "增强图");
      const best = pickBetterOCRResult(firstPass, secondPass);
      return best.text;
    }

    function loadHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        if (!Array.isArray(parsed)) return [];
        return parsed;
      } catch {
        return [];
      }
    }

    function saveHistoryItem(item) {
      const current = loadHistory();
      const next = [item, ...current].slice(0, 10);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(next));
      renderHistory();
    }

    function renderHistory() {
      const items = loadHistory();
      historyListEl.innerHTML = "";

      if (!items.length) {
        const li = document.createElement("li");
        li.textContent = "暂无历史记录";
        li.className = "small";
        historyListEl.appendChild(li);
        return;
      }

      for (const item of items) {
        const li = document.createElement("li");
        li.className = "history-item";
        const btn = document.createElement("button");
        const brief = item.sourceText.length > 80 ? `${item.sourceText.slice(0, 80)}...` : item.sourceText;
        btn.textContent = `[${item.sourceLanguage} -> ${item.targetLanguage}] ${brief}`;
        btn.addEventListener("click", () => {
          targetLangInput.value = item.targetLanguage;
          ocrTextArea.value = item.sourceText;
          translatedTextArea.value = item.translatedText;
          detectedLangEl.textContent = `检测到语言：${item.sourceLanguage}`;
          copyBtn.disabled = false;
          exportPdfBtn.disabled = false;
          setStatus("已载入历史记录。", false);
        });
        li.appendChild(btn);
        historyListEl.appendChild(li);
      }
    }

    async function translateViaBackend(sourceText, targetLanguage, model) {
      const response = await fetch(`${WORKER_BASE_URL}/api/translate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sourceText, targetLanguage, model })
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || `后端翻译失败：HTTP ${response.status}`);
      }

      if (!data.translatedText || typeof data.translatedText !== "string") {
        throw new Error("后端返回数据异常：缺少 translatedText。");
      }

      return {
        translatedText: data.translatedText,
        sourceLanguage: typeof data.sourceLanguage === "string" && data.sourceLanguage.trim()
          ? data.sourceLanguage.trim()
          : "未知"
      };
    }

    async function run() {
      const file = imageInput.files[0];
      const targetLanguage = targetLangInput.value.trim();
      const ocrLanguages = ocrLangInput.value.trim() || "eng";
      const model = modelInput.value.trim() || "deepseek-chat";

      if (!file) {
        setStatus("请先上传一张图片。", true);
        return;
      }
      if (!targetLanguage) {
        setStatus("请填写目标语言。", true);
        return;
      }
      runBtn.disabled = true;
      copyBtn.disabled = true;
      exportPdfBtn.disabled = true;
      translatedTextArea.value = "";
      detectedLangEl.textContent = "检测到语言：-";

      try {
        setStatus("开始 OCR 识别...");
        const ocrText = await recognizeText(file, ocrLanguages);
        ocrTextArea.value = ocrText;

        if (!ocrText) {
          throw new Error("OCR 未识别到可用文字，请换更清晰的图片或调整 OCR 语言代码。");
        }

        setStatus("OCR 完成，正在调用后端翻译...");
        const result = await translateViaBackend(ocrText, targetLanguage, model);
        translatedTextArea.value = result.translatedText;
        detectedLangEl.textContent = `检测到语言：${result.sourceLanguage}`;

        saveHistoryItem({
          sourceLanguage: result.sourceLanguage,
          targetLanguage,
          sourceText: ocrText,
          translatedText: result.translatedText,
          createdAt: Date.now()
        });

        copyBtn.disabled = false;
        exportPdfBtn.disabled = false;
        setStatus("完成：已识别并翻译。", false);
      } catch (err) {
        setStatus(err.message || "发生未知错误", true);
      } finally {
        runBtn.disabled = false;
      }
    }

    runBtn.addEventListener("click", run);

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(translatedTextArea.value);
        setStatus("翻译结果已复制到剪贴板。", false);
      } catch {
        setStatus("复制失败，请手动复制文本。", true);
      }
    });

    exportPdfBtn.addEventListener("click", async () => {
      const translated = translatedTextArea.value.trim();
      if (!translated) {
        setStatus("暂无可导出的翻译结果。", true);
        return;
      }

      const sourceLang = detectedLangEl.textContent.replace("检测到语言：", "").trim() || "未知";
      const targetLang = targetLangInput.value.trim() || "未指定";
      const now = new Date();
      const ts = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}_${String(now.getHours()).padStart(2, "0")}-${String(now.getMinutes()).padStart(2, "0")}`;
      const filename = `translation_${ts}.pdf`;

      const container = document.createElement("div");
      container.style.width = "800px";
      container.style.padding = "24px";
      container.style.fontFamily = "\"Noto Sans SC\", \"PingFang SC\", \"Microsoft YaHei\", sans-serif";
      container.style.background = "#ffffff";
      container.style.color = "#111827";
      container.innerHTML = `
        <h1 style="margin:0 0 12px;font-size:24px;">翻译结果导出</h1>
        <p style="margin:0 0 6px;font-size:14px;">导出时间：${now.toLocaleString()}</p>
        <p style="margin:0 0 6px;font-size:14px;">检测语言：${sourceLang}</p>
        <p style="margin:0 0 16px;font-size:14px;">目标语言：${targetLang}</p>
        <h2 style="margin:0 0 8px;font-size:18px;">翻译内容</h2>
        <div style="font-size:14px;line-height:1.6;white-space:pre-wrap;border:1px solid #e5e7eb;border-radius:8px;padding:12px;">${escapeHtml(translated)}</div>
      `;
      document.body.appendChild(container);

      try {
        setStatus("正在生成 PDF...", false);
        await html2pdf().set({
          margin: [10, 10, 10, 10],
          filename,
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
        }).from(container).save();
        setStatus("PDF 导出完成。", false);
      } catch (err) {
        setStatus(err.message || "PDF 导出失败。", true);
      } finally {
        container.remove();
      }
    });

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    renderHistory();
  </script>
</body>
</html>
