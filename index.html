<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主页</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #111827;
      padding-bottom: 92px;
    }

    .entry {
      position: fixed;
      top: 16px;
      right: 16px;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: #0f766e;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.18);
      z-index: 20;
    }

    .entry:hover {
      background: #115e59;
    }

    .bgm-bar {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 30;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: rgba(248, 250, 252, 0.92);
      backdrop-filter: blur(8px);
      padding: 8px 10px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.12);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .meta {
      flex: 1 1 240px;
      margin: 0;
      color: #64748b;
      font-size: 12px;
      line-height: 1.35;
      min-height: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: #0f766e;
      cursor: pointer;
    }

    .btn:hover {
      background: #115e59;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      margin: 6px 0 0;
      font-size: 12px;
      color: #64748b;
      min-height: 16px;
    }

    #player {
      width: 100%;
      margin-top: 6px;
      height: 34px;
    }
  </style>
</head>
<body>
  <a class="entry" href="tool.html">进入 OCR 翻译工具</a>

  <section class="bgm-bar" aria-label="背景音乐播放器">
    <div class="row">
      <p id="songMeta" class="meta">正在初始化随机推荐...</p>
      <div class="actions">
        <button id="playRandomBtn" class="btn">播放</button>
        <button id="nextBtn" class="btn">下一首</button>
        <button id="checkLoginBtn" class="btn">登录状态</button>
      </div>
    </div>
    <audio id="player" controls preload="none" controlsList="nodownload noplaybackrate"></audio>
    <p id="status" class="status"></p>
  </section>

  <script>
    const WORKER_BASE_URL = "https://restless-credit-a6e1.wangderingfiction.workers.dev";
    const player = document.getElementById("player");
    const songMeta = document.getElementById("songMeta");
    const statusEl = document.getElementById("status");
    const playRandomBtn = document.getElementById("playRandomBtn");
    const nextBtn = document.getElementById("nextBtn");
    const checkLoginBtn = document.getElementById("checkLoginBtn");

    let loadingSong = false;

    function setStatus(message) {
      statusEl.textContent = message || "";
    }

    function formatSongMeta(song) {
      const artists = Array.isArray(song.artists) && song.artists.length ? song.artists.join(" / ") : "未知歌手";
      return `${song.name} - ${artists}`;
    }

    async function fetchRandomSong() {
      const resp = await fetch(`${WORKER_BASE_URL}/api/netease/random-song`);
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        throw new Error(data.error || `拉取随机推荐失败：HTTP ${resp.status}`);
      }
      if (!data.streamUrl) {
        throw new Error("后端未返回可播放链接。");
      }
      return data;
    }

    async function playRandomSong(auto = false) {
      if (loadingSong) return;
      loadingSong = true;
      playRandomBtn.disabled = true;
      nextBtn.disabled = true;

      try {
        setStatus(auto ? "自动加载随机推荐中..." : "正在获取随机推荐...");
        const song = await fetchRandomSong();
        player.src = song.streamUrl;
        songMeta.textContent = formatSongMeta(song);
        await player.play();
        setStatus("播放中");
      } catch (error) {
        setStatus(error.message || "播放失败");
      } finally {
        loadingSong = false;
        playRandomBtn.disabled = false;
        nextBtn.disabled = false;
      }
    }

    async function checkLogin() {
      checkLoginBtn.disabled = true;
      try {
        setStatus("正在检查后端网易云登录状态...");
        const resp = await fetch(`${WORKER_BASE_URL}/api/netease/profile`);
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          throw new Error(data.error || `登录状态检查失败：HTTP ${resp.status}`);
        }
        setStatus(`已登录：${data.nickname || "未知用户"}`);
      } catch (error) {
        setStatus(error.message || "登录状态检查失败");
      } finally {
        checkLoginBtn.disabled = false;
      }
    }

    playRandomBtn.addEventListener("click", () => playRandomSong(false));
    nextBtn.addEventListener("click", () => playRandomSong(false));
    checkLoginBtn.addEventListener("click", checkLogin);

    player.addEventListener("ended", () => {
      playRandomSong(true);
    });

    window.addEventListener("load", () => {
      playRandomSong(true);
    });
  </script>
</body>
</html>
