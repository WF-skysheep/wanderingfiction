<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片文字识别与翻译（DeepSeek 后端）</title>
  <style>
    :root {
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --border: #e5e7eb;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(140deg, #f1f5f9, #f8fafc 45%, #eef2ff);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 28px;
    }

    p {
      margin-top: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    @media (min-width: 760px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.45;
    }

    input[type="file"] {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
    }

    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .secondary { background: #475569; }
    .secondary:hover { background: #334155; }

    .status {
      margin: 10px 0 0;
      font-size: 14px;
      color: var(--muted);
      min-height: 22px;
    }

    .error {
      color: var(--danger);
      font-weight: 600;
    }

    .preview {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    .out { margin-top: 12px; }

    .detected {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .history {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #f8fafc;
    }

    .history h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .history-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 240px;
      overflow: auto;
    }

    .history-item button {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
    }

    .history-item button:hover {
      background: #f1f5f9;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>图片文字识别 + DeepSeek 翻译</h1>
    <p>前端只负责 OCR；翻译由独立 Cloudflare Worker 后端调用 DeepSeek API，避免在浏览器暴露密钥。</p>

    <div class="grid">
      <div class="field">
        <label for="targetLang">目标语言</label>
        <input id="targetLang" type="text" placeholder="例如：简体中文 / English / 日本語" value="简体中文">
      </div>

      <div class="field">
        <label for="model">DeepSeek 模型</label>
        <select id="model">
          <option value="deepseek-chat" selected>chat (deepseek-chat)</option>
          <option value="deepseek-reasoner">reasoner (deepseek-reasoner)</option>
        </select>
      </div>

      <div class="field">
        <label for="ocrLang">OCR 识别语言代码（Tesseract）</label>
        <input id="ocrLang" type="text" value="eng+chi_sim+jpn+kor+spa+fra+deu+rus+ara">
        <span class="small">可按需减少语言以加快识别，例如只保留 <code>eng+chi_sim</code>。</span>
      </div>
    </div>

    <div class="field">
      <label for="imageInput">上传图片</label>
      <input id="imageInput" type="file" accept="image/*">
    </div>

    <div class="actions">
      <button id="runBtn">开始识别并翻译</button>
      <button id="copyBtn" class="secondary" disabled>复制翻译结果</button>
    </div>

    <p id="status" class="status">等待上传图片...</p>
    <p id="detectedLang" class="detected">检测到语言：-</p>

    <div class="grid out">
      <div class="field">
        <label for="ocrText">识别出的原文</label>
        <textarea id="ocrText" placeholder="OCR 结果会显示在这里"></textarea>
      </div>

      <div class="field">
        <label for="translatedText">翻译结果</label>
        <textarea id="translatedText" placeholder="翻译结果会显示在这里"></textarea>
      </div>
    </div>

    <div class="field">
      <label>图片预览</label>
      <img id="preview" class="preview" alt="上传图片预览">
    </div>

    <section class="history">
      <h2>最近翻译记录（10条）</h2>
      <ul id="historyList" class="history-list"></ul>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const WORKER_BASE_URL = "https://restless-credit-a6e1.wangderingfiction.workers.dev";
    const imageInput = document.getElementById("imageInput");
    const runBtn = document.getElementById("runBtn");
    const copyBtn = document.getElementById("copyBtn");
    const targetLangInput = document.getElementById("targetLang");
    const ocrLangInput = document.getElementById("ocrLang");
    const modelInput = document.getElementById("model");
    const ocrTextArea = document.getElementById("ocrText");
    const translatedTextArea = document.getElementById("translatedText");
    const statusEl = document.getElementById("status");
    const detectedLangEl = document.getElementById("detectedLang");
    const previewEl = document.getElementById("preview");
    const historyListEl = document.getElementById("historyList");
    const HISTORY_KEY = "ocr_translate_history_v1";

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      previewEl.src = url;
      setStatus("图片已选择，可以开始识别。", false);
    });

    async function recognizeText(file, languages) {
      const { data } = await Tesseract.recognize(file, languages, {
        logger: (m) => {
          if (m.status && typeof m.progress === "number") {
            const percent = Math.round(m.progress * 100);
            setStatus(`OCR：${m.status} (${percent}%)`);
          }
        }
      });
      return data.text.trim();
    }

    function loadHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        if (!Array.isArray(parsed)) return [];
        return parsed;
      } catch {
        return [];
      }
    }

    function saveHistoryItem(item) {
      const current = loadHistory();
      const next = [item, ...current].slice(0, 10);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(next));
      renderHistory();
    }

    function renderHistory() {
      const items = loadHistory();
      historyListEl.innerHTML = "";

      if (!items.length) {
        const li = document.createElement("li");
        li.textContent = "暂无历史记录";
        li.className = "small";
        historyListEl.appendChild(li);
        return;
      }

      for (const item of items) {
        const li = document.createElement("li");
        li.className = "history-item";
        const btn = document.createElement("button");
        const brief = item.sourceText.length > 80 ? `${item.sourceText.slice(0, 80)}...` : item.sourceText;
        btn.textContent = `[${item.sourceLanguage} -> ${item.targetLanguage}] ${brief}`;
        btn.addEventListener("click", () => {
          targetLangInput.value = item.targetLanguage;
          ocrTextArea.value = item.sourceText;
          translatedTextArea.value = item.translatedText;
          detectedLangEl.textContent = `检测到语言：${item.sourceLanguage}`;
          copyBtn.disabled = false;
          setStatus("已载入历史记录。", false);
        });
        li.appendChild(btn);
        historyListEl.appendChild(li);
      }
    }

    async function translateViaBackend(sourceText, targetLanguage, model) {
      const response = await fetch(`${WORKER_BASE_URL}/api/translate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sourceText, targetLanguage, model })
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || `后端翻译失败：HTTP ${response.status}`);
      }

      if (!data.translatedText || typeof data.translatedText !== "string") {
        throw new Error("后端返回数据异常：缺少 translatedText。");
      }

      return {
        translatedText: data.translatedText,
        sourceLanguage: typeof data.sourceLanguage === "string" && data.sourceLanguage.trim()
          ? data.sourceLanguage.trim()
          : "未知"
      };
    }

    async function run() {
      const file = imageInput.files[0];
      const targetLanguage = targetLangInput.value.trim();
      const ocrLanguages = ocrLangInput.value.trim() || "eng";
      const model = modelInput.value.trim() || "deepseek-chat";

      if (!file) {
        setStatus("请先上传一张图片。", true);
        return;
      }
      if (!targetLanguage) {
        setStatus("请填写目标语言。", true);
        return;
      }

      runBtn.disabled = true;
      copyBtn.disabled = true;
      translatedTextArea.value = "";
      detectedLangEl.textContent = "检测到语言：-";

      try {
        setStatus("开始 OCR 识别...");
        const ocrText = await recognizeText(file, ocrLanguages);
        ocrTextArea.value = ocrText;

        if (!ocrText) {
          throw new Error("OCR 未识别到可用文字，请换更清晰的图片或调整 OCR 语言代码。");
        }

        setStatus("OCR 完成，正在调用后端翻译...");
        const result = await translateViaBackend(ocrText, targetLanguage, model);
        translatedTextArea.value = result.translatedText;
        detectedLangEl.textContent = `检测到语言：${result.sourceLanguage}`;

        saveHistoryItem({
          sourceLanguage: result.sourceLanguage,
          targetLanguage,
          sourceText: ocrText,
          translatedText: result.translatedText,
          createdAt: Date.now()
        });

        copyBtn.disabled = false;
        setStatus("完成：已识别并翻译。", false);
      } catch (err) {
        setStatus(err.message || "发生未知错误", true);
      } finally {
        runBtn.disabled = false;
      }
    }

    runBtn.addEventListener("click", run);

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(translatedTextArea.value);
        setStatus("翻译结果已复制到剪贴板。", false);
      } catch {
        setStatus("复制失败，请手动复制文本。", true);
      }
    });

    renderHistory();
  </script>
</body>
</html>
