<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片文字识别与AI翻译</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --border: #e5e7eb;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(140deg, #f1f5f9, #f8fafc 45%, #eef2ff);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 28px;
    }

    p {
      margin-top: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    @media (min-width: 760px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.45;
    }

    input[type="file"] {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
    }

    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .secondary {
      background: #475569;
    }

    .secondary:hover {
      background: #334155;
    }

    .status {
      margin: 10px 0 0;
      font-size: 14px;
      color: var(--muted);
      min-height: 22px;
    }

    .error {
      color: var(--danger);
      font-weight: 600;
    }

    .preview {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    .out {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>图片文字识别 + AI 翻译</h1>
    <p>上传图片后，网页会先进行 OCR 识别（支持多语言），再调用 OpenAI 将内容翻译成你指定的目标语言。</p>

    <div class="grid">
      <div class="field">
        <label for="apiKey">OpenAI API Key</label>
        <input id="apiKey" type="password" placeholder="sk-...">
        <span class="small">仅用于当前浏览器会话，不会自动上传到你的仓库。</span>
      </div>

      <div class="field">
        <label for="targetLang">目标语言</label>
        <input id="targetLang" type="text" placeholder="例如：简体中文 / English / 日本語" value="简体中文">
      </div>

      <div class="field">
        <label for="ocrLang">OCR 识别语言代码（Tesseract）</label>
        <input id="ocrLang" type="text" value="eng+chi_sim+jpn+kor+spa+fra+deu+rus+ara">
        <span class="small">可按需减少语言以加快识别，例如只保留 <code>eng+chi_sim</code>。</span>
      </div>

      <div class="field">
        <label for="model">翻译模型</label>
        <input id="model" type="text" value="gpt-4.1-mini">
      </div>
    </div>

    <div class="field">
      <label for="imageInput">上传图片</label>
      <input id="imageInput" type="file" accept="image/*">
    </div>

    <div class="actions">
      <button id="runBtn">开始识别并翻译</button>
      <button id="copyBtn" class="secondary" disabled>复制翻译结果</button>
    </div>

    <p id="status" class="status">等待上传图片...</p>

    <div class="grid out">
      <div class="field">
        <label for="ocrText">识别出的原文</label>
        <textarea id="ocrText" placeholder="OCR 结果会显示在这里"></textarea>
      </div>

      <div class="field">
        <label for="translatedText">翻译结果</label>
        <textarea id="translatedText" placeholder="翻译结果会显示在这里"></textarea>
      </div>
    </div>

    <div class="field">
      <label>图片预览</label>
      <img id="preview" class="preview" alt="上传图片预览">
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const imageInput = document.getElementById("imageInput");
    const runBtn = document.getElementById("runBtn");
    const copyBtn = document.getElementById("copyBtn");
    const apiKeyInput = document.getElementById("apiKey");
    const targetLangInput = document.getElementById("targetLang");
    const ocrLangInput = document.getElementById("ocrLang");
    const modelInput = document.getElementById("model");
    const ocrTextArea = document.getElementById("ocrText");
    const translatedTextArea = document.getElementById("translatedText");
    const statusEl = document.getElementById("status");
    const previewEl = document.getElementById("preview");

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      previewEl.src = url;
      setStatus("图片已选择，可以开始识别。", false);
    });

    async function recognizeText(file, languages) {
      const { data } = await Tesseract.recognize(file, languages, {
        logger: (m) => {
          if (m.status && typeof m.progress === "number") {
            const percent = Math.round(m.progress * 100);
            setStatus(`OCR：${m.status} (${percent}%)`);
          }
        }
      });
      return data.text.trim();
    }

    async function translateTextWithOpenAI(sourceText, targetLanguage, apiKey, model) {
      const prompt = [
        "你是专业翻译助手。",
        `请将用户提供的文本翻译成：${targetLanguage}。`,
        "要求：",
        "1) 保留原意，不要编造。",
        "2) 保持段落结构。",
        "3) 如果存在明显乱码，尽量基于上下文修复后翻译。",
        "4) 只输出翻译结果，不要附加说明。"
      ].join("\n");

      const response = await fetch("https://api.openai.com/v1/responses", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model,
          input: [
            { role: "system", content: prompt },
            { role: "user", content: sourceText }
          ],
          temperature: 0.2
        })
      });

      if (!response.ok) {
        const detail = await response.text();
        throw new Error(`OpenAI 请求失败：${response.status} ${detail}`);
      }

      const json = await response.json();
      if (json.output_text && json.output_text.trim()) {
        return json.output_text.trim();
      }

      const fallback = json.output
        ?.flatMap(item => item.content || [])
        ?.filter(c => c.type === "output_text")
        ?.map(c => c.text)
        ?.join("\n")
        ?.trim();

      if (!fallback) {
        throw new Error("未从 OpenAI 响应中解析到翻译文本。");
      }

      return fallback;
    }

    async function run() {
      const file = imageInput.files[0];
      const apiKey = apiKeyInput.value.trim();
      const targetLanguage = targetLangInput.value.trim();
      const ocrLanguages = ocrLangInput.value.trim() || "eng";
      const model = modelInput.value.trim() || "gpt-4.1-mini";

      if (!file) {
        setStatus("请先上传一张图片。", true);
        return;
      }
      if (!apiKey) {
        setStatus("请先填写 OpenAI API Key。", true);
        return;
      }
      if (!targetLanguage) {
        setStatus("请填写目标语言。", true);
        return;
      }

      runBtn.disabled = true;
      copyBtn.disabled = true;
      translatedTextArea.value = "";

      try {
        setStatus("开始 OCR 识别...");
        const ocrText = await recognizeText(file, ocrLanguages);
        ocrTextArea.value = ocrText;

        if (!ocrText) {
          throw new Error("OCR 未识别到可用文字，请换更清晰的图片或调整 OCR 语言代码。");
        }

        setStatus("OCR 完成，正在调用 AI 翻译...");
        const translated = await translateTextWithOpenAI(ocrText, targetLanguage, apiKey, model);
        translatedTextArea.value = translated;

        copyBtn.disabled = false;
        setStatus("完成：已识别并翻译。", false);
      } catch (err) {
        setStatus(err.message || "发生未知错误", true);
      } finally {
        runBtn.disabled = false;
      }
    }

    runBtn.addEventListener("click", run);

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(translatedTextArea.value);
        setStatus("翻译结果已复制到剪贴板。", false);
      } catch {
        setStatus("复制失败，请手动复制文本。", true);
      }
    });
  </script>
</body>
</html>
